<!doctype html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Async Blog{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 1.5rem; line-height: 1.6; }
    a { color: #0b7285; text-decoration: none; }
    .card { background: #f6f8fa; border-radius: 8px; padding: 1rem 1.25rem; margin: 1rem 0; }
    .muted { color: #666; font-size: .9rem; }
  </style>
</head>
<body>
  <header>
    <strong><a href="{% url 'blog:post-list' %}">⚡ Async Blog</a></strong>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
