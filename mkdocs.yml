site_name: Django Survival Guide
site_description: Aprenda Django moderno com tipagem clara, orientação a objetos e zero mágica.
site_author: Mauricio Benjamin
repo_url: https://github.com/mauriciobenjamin700/django-survival-guide
repo_name: django-survival-guide
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - pt
        - en
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          paths: [example]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            heading_level: 3
  - i18n:
      docs_structure: suffix
      languages:
        - locale: pt
          default: true
          name: Português
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Início: Home
            Comece aqui: Get started
            Instalação: Installation
            Fundamentos web (HTML, CSS, JS): Web fundamentals (HTML, CSS, JS)
            Como a web funciona: How the web works
            "HTTP: GET, POST, PUT, DELETE e afins": "HTTP: GET, POST, PUT, DELETE & friends"
            HTML do zero: HTML from scratch
            CSS do zero: CSS from scratch
            JavaScript do zero: JavaScript from scratch
            Juntando com Django: Putting it together with Django
            Tutorial - Guia do usuário: Tutorial - User Guide
            Configurando o projeto: Setting up the project
            Modelos e o ORM: Models and the ORM
            Relações a fundo: Relationships in depth
            Migrações: Migrations
            Admin do Django: Django admin
            QuerySets e consultas: QuerySets and queries
            Views baseadas em classe: Class-based views
            URLs e rotas: URLs and routing
            Templates: Templates
            Formulários: Forms
            Autenticação: Authentication
