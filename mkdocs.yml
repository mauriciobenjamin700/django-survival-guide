            Settings: Settings
            DRF — serializers e viewsets: DRF — serializers & viewsets
            Middleware: Middleware
            Signals: Signals
            Sessions e messages: Sessions & messages
            Cache: Cache
            Management commands: Management commands
            Transações: Transactions
            Formsets: Formsets
            Arquivos estáticos e media: Static files & media
            i18n e traduções: i18n & translations
            Deploy: Deployment
            Deploy com Docker Compose: Deploy with Docker Compose
            Agregação e group by: Aggregation & group by
            Validators e validação: Validators & validation
            Campos customizados: Custom fields
            Content types e relações genéricas: Content types & generic relations
            Storages (armazenamento): Storages
            Motores de template (DTL × Jinja2): Template engines (DTL vs Jinja2)
