site_name: Django Survival Guide
site_description: Aprenda Django moderno com tipagem clara, orientação a objetos e zero mágica.
site_author: Mauricio Benjamin
repo_url: https://github.com/mauriciobenjamin700/django-survival-guide
repo_name: django-survival-guide
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - pt
        - en
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          paths: [example]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            heading_level: 3
  - i18n:
      docs_structure: suffix
      languages:
        - locale: pt
          default: true
          name: Português
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Início: Home
            Comece aqui: Get started
            Instalação: Installation
            Tutorial - Guia do usuário: Tutorial - User Guide
            Configurando o projeto: Setting up the project
            Modelos e o ORM: Models and the ORM
            Migrações: Migrations
            Admin do Django: Django admin
            QuerySets e consultas: QuerySets and queries
            Views baseadas em classe: Class-based views
            URLs e rotas: URLs and routing
            Templates: Templates
            Formulários: Forms
            Autenticação: Authentication
            Guia avançado: Advanced Guide
            API REST com DRF: REST API with DRF
            Testes: Testing
            Referência: Reference
            Visão geral: Overview
            ORM avançado (expressions): Advanced ORM (expressions)
            Generic views e mixins: Generic views & mixins
            Testes a fundo: Testing in depth
            Models — campos: Models — fields
            Models — Meta: Models — Meta
            QuerySet API: QuerySet API
            URLs e conversores: URLs & converters
            Formulários e ModelForm: Forms & ModelForm
            Admin: Admin
            Autenticação e permissões: Authentication & permissions
            Settings: Settings
            DRF — serializers e viewsets: DRF — serializers & viewsets
            Middleware: Middleware
            Signals: Signals
            Sessions e messages: Sessions & messages
            Cache: Cache
            Management commands: Management commands
            Transações: Transactions
            Formsets: Formsets
            Arquivos estáticos e media: Static files & media
            i18n e traduções: i18n & translations
            Deploy: Deployment
            Referência de API (código): API reference (code)

nav:
  - Início: index.md
  - Comece aqui:
      - Instalação: get-started/installation.md
  - Tutorial - Guia do usuário:
      - Configurando o projeto: tutorial/project-setup.md
      - Modelos e o ORM: tutorial/models.md
      - Migrações: tutorial/migrations.md
      - Admin do Django: tutorial/admin.md
      - QuerySets e consultas: tutorial/querysets.md
      - Views baseadas em classe: tutorial/class-based-views.md
      - URLs e rotas: tutorial/urls.md
      - Templates: tutorial/templates.md
      - Formulários: tutorial/forms.md
      - Autenticação: tutorial/authentication.md
  - Guia avançado:
      - API REST com DRF: advanced/drf.md
      - Testes: advanced/testing.md
  - Referência:
      - Visão geral: referencia/index.md
      - Models — campos: referencia/models-fields.md
      - Models — Meta: referencia/models-meta.md
      - QuerySet API: referencia/querysets-api.md
      - ORM avançado (expressions): referencia/orm-expressions.md
      - Views baseadas em classe: referencia/views-cbv.md
      - Generic views e mixins: referencia/generic-views.md
      - URLs e conversores: referencia/urls.md
      - Templates: referencia/templates.md
      - Formulários e ModelForm: referencia/forms.md
      - Admin: referencia/admin.md
      - Autenticação e permissões: referencia/auth.md
      - Settings: referencia/settings.md
      - DRF — serializers e viewsets: referencia/drf.md
      - Middleware: referencia/middleware.md
      - Signals: referencia/signals.md
      - Sessions e messages: referencia/sessions-messages.md
      - Cache: referencia/cache.md
      - Management commands: referencia/management-commands.md
      - Transações: referencia/transactions.md
      - Formsets: referencia/formsets.md
      - Arquivos estáticos e media: referencia/static-media.md
      - i18n e traduções: referencia/i18n.md
