services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: "change-me-in-production"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_DB_NAME: blog
      DJANGO_DB_USER: blog
      DJANGO_DB_PASSWORD: blog
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "5432"
    volumes:
      - media:/app/example/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media:
