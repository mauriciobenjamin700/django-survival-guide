{% extends "base.html" %}

{% block title %}{% if form.instance.pk %}Edit post{% else %}New post{% endif %} — Blog{% endblock %}

{% block content %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
  </form>
{% endblock %}
