{% extends "base.html" %}

{% block title %}Delete “{{ object.title }}” — Blog{% endblock %}

{% block content %}
  <h1>Delete post</h1>
  <p>Are you sure you want to delete “<strong>{{ object.title }}</strong>”?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{{ object.get_absolute_url }}">Cancel</a>
  </form>
{% endblock %}
